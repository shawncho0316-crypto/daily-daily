<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily English</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Nunito:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  /* Purple palette */
  --p900: #3b0764;
  --p800: #5b21b6;
  --p700: #6d28d9;
  --p600: #7c3aed;
  --p500: #8b5cf6;
  --p400: #a78bfa;
  --p100: #ede9fe;
  --p50:  #f5f3ff;

  /* Neutrals */
  --bg:     #f8f7ff;
  --white:  #ffffff;
  --ink:    #1c1033;
  --ink2:   #4a4068;
  --ink3:   #8b82a7;
  --border: #e4dff5;
  --border2:#cdc5e8;

  /* Accents */
  --green:  #059669; --green-l: #ecfdf5;
  --amber:  #d97706; --amber-l: #fffbeb;
  --red:    #dc2626; --red-l:   #fef2f2;

  --sh:  0 1px 12px rgba(109,40,217,.07);
  --sh2: 0 4px 24px rgba(109,40,217,.12);
  --r: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  line-height: 1.75;
  min-height: 100vh;
}

/* ── HEADER ───────────────────────────────── */
.hdr {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(109,40,217,.08);
}
.hdr-inner { max-width: 740px; margin: 0 auto; padding: 16px 20px 0; }

.hdr-top {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 14px;
}

.logo {
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--p600), var(--p800));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; box-shadow: 0 2px 8px rgba(124,58,237,.35);
}
.logo-text {
  font-family: 'Outfit', sans-serif;
  font-size: 18px; font-weight: 800;
  color: var(--ink);
  letter-spacing: -.4px;
  line-height: 1;
}
.logo-text span {
  display: block; font-size: 10px; font-weight: 600;
  color: var(--p600); letter-spacing: .8px; text-transform: uppercase;
  margin-top: 1px;
}
.date-pill {
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 600;
  color: var(--ink3); background: var(--p50);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 4px 12px;
}

/* key bar */
.key-bar {
  background: var(--p50); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
  display: flex; gap: 8px; align-items: center;
  flex-wrap: wrap; margin-bottom: 14px;
}
.key-bar label {
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 700; color: var(--p700);
  letter-spacing: .3px; white-space: nowrap;
}
.key-bar input {
  flex: 1; min-width: 140px;
  background: var(--white); border: 1px solid var(--border2);
  border-radius: 8px; padding: 6px 11px;
  font-size: 12px; color: var(--ink); font-family: monospace;
  transition: border-color .2s, box-shadow .2s;
}
.key-bar input::placeholder { color: var(--ink3); }
.key-bar input:focus { outline: none; border-color: var(--p500); box-shadow: 0 0 0 3px rgba(139,92,246,.12); }
.kbtn {
  padding: 6px 14px; border-radius: 8px;
  font-size: 12px; font-weight: 700;
  border: none; cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: all .2s; white-space: nowrap;
}
.kbtn.p { background: var(--p600); color: #fff; }
.kbtn.p:hover { background: var(--p700); }
.kbtn.g { background: var(--white); color: var(--ink3); border: 1px solid var(--border2); }
.kbtn.g:hover { border-color: var(--p400); color: var(--p700); }

/* tabs */
.tabs { display: flex; gap: 4px; }
.tab {
  flex: 1; padding: 11px 8px; text-align: center;
  font-family: 'Outfit', sans-serif;
  font-size: 11.5px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
  color: var(--ink3); border-bottom: 3px solid transparent;
  cursor: pointer; transition: all .2s; white-space: nowrap; border-radius: 2px 2px 0 0;
}
.tab:hover { color: var(--p600); background: var(--p50); }
.tab.active { color: var(--p700); border-color: var(--p600); background: var(--p50); }

/* ── MAIN ─────────────────────────────────── */
.main { max-width: 740px; margin: 0 auto; padding: 24px 20px 64px; }
.panel { display: none; } .panel.active { display: block; }

/* section top */
.sec-top {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 14px;
  gap: 10px; flex-wrap: wrap;
}
.sec-label {
  font-family: 'Outfit', sans-serif;
  font-size: 17px; font-weight: 800; color: var(--ink);
  letter-spacing: -.3px;
}
.sec-acts { display: flex; gap: 7px; }
.abtn {
  font-family: 'Outfit', sans-serif;
  font-size: 11.5px; font-weight: 700; padding: 5px 14px; border-radius: 20px;
  border: 1.5px solid var(--border2); background: var(--white); color: var(--ink3);
  cursor: pointer; transition: all .2s; white-space: nowrap; box-shadow: var(--sh);
}
.abtn:hover { border-color: var(--p500); color: var(--p700); background: var(--p50); }
.abtn.pal-on { background: var(--p600); color: #fff; border-color: var(--p600); box-shadow: 0 2px 10px rgba(124,58,237,.3); }
.abtn.memo-on { background: var(--amber-l); color: var(--amber); border-color: rgba(217,119,6,.35); }


/* ── SCRIPT CARD ──────────────────────────── */
.scard {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--sh);
  margin-bottom: 14px;
  overflow: hidden;
}
.card-head {
  background: linear-gradient(135deg, var(--p700) 0%, var(--p800) 100%);
  padding: 14px 20px;
  display: flex; align-items: center; gap: 10px;
}
.card-head-icon { font-size: 20px; }
.card-head-title {
  font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 700; color: #fff;
  letter-spacing: -.1px;
}

/* ── LINES ────────────────────────────────── */
.line { border-bottom: 1px solid var(--border); padding: 15px 20px; }
.line:last-child { border-bottom: none; }
.line-top { display: flex; align-items: flex-start; gap: 10px; }

.spk {
  font-family: 'Outfit', sans-serif;
  font-size: 9.5px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 6px; white-space: nowrap;
  flex-shrink: 0; margin-top: 3px;
}

.lt {
  flex: 1; font-size: 15px; font-weight: 500; line-height: 1.75;
  cursor: pointer; transition: color .15s; color: var(--ink);
}
.lt:hover { color: var(--p600); }

/* memo mode */
.memo-on .lt {
  background: var(--p50); color: transparent !important;
  border-radius: 8px; user-select: none; transition: none;
}
.memo-on .lt.rev {
  background: var(--amber-l); color: var(--ink) !important;
  border-radius: 8px; outline: 1.5px solid rgba(217,119,6,.25);
}

/* tts + dl buttons */
.line-btns { display: flex; gap: 3px; margin-top: 2px; flex-shrink: 0; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  font-size: 13px; width: 30px; height: 30px;
  border-radius: 8px; color: var(--ink3);
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.icon-btn:hover { background: var(--p50); color: var(--p600); }
.icon-btn.pl { color: var(--p600); animation: pulse .9s infinite; }
.icon-btn.dl:hover { background: var(--green-l); color: var(--green); }
.icon-btn.dl.loading { color: var(--amber); animation: pulse .9s infinite; }
.icon-btn.dl.done { color: var(--green); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* expand row */
.xrow { display: flex; gap: 6px; margin-top: 9px; padding-left: 58px; }
.xbtn {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 20px;
  border: 1px solid var(--border2); background: var(--bg); color: var(--ink3);
  cursor: pointer; transition: all .2s; letter-spacing: .2px;
}
.xbtn:hover, .xbtn.open {
  border-color: var(--p400); color: var(--p700); background: var(--p50);
}
.xbtn .arr { transition: transform .2s; font-size: 9px; }
.xbtn.open .arr { transform: rotate(90deg); }

/* expand panels */
.xpanel {
  display: none; margin-left: 58px; margin-top: 8px;
  border-left: 3px solid var(--border2); border-radius: 0 10px 10px 0;
  padding: 12px 15px; font-size: 13.5px;
  background: var(--bg); animation: fadein .18s ease;
}
@keyframes fadein { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
.xpanel.open { display: block; }
.ko-txt { color: var(--p800); font-weight: 600; line-height: 1.8; }
.npanel { border-left-color: var(--amber); background: var(--amber-l); }

.ni { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,.07); }
.ni:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
.ntag {
  font-family: 'Outfit', sans-serif;
  font-size: 9.5px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 5px; margin-right: 5px; vertical-align: middle;
}
.tag-grammar { background: #dbeafe; color: #1e40af; }
.tag-vocab   { background: #d1fae5; color: #065f46; }
.tag-phrase  { background: #fef3c7; color: #92400e; }
.tag-idiom   { background: #ede9fe; color: #5b21b6; }
.nko { font-size: 13.5px; color: var(--ink); margin-top: 3px; line-height: 1.65; }
.nex { font-size: 12.5px; color: var(--ink3); font-style: italic; margin-top: 5px; }
.nex-ko { font-size: 12px; color: var(--p600); margin-top: 2px; font-style: normal; font-weight: 500; }

/* chunk panel */
.ckpanel { border-left-color: #0ea5e9; background: #f0f9ff; }
body.dark .ckpanel { background: #0c1e2e; border-left-color: #38bdf8; }
.chunk-wrap { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; line-height: 1.9; }
.chunk {
  background: #fff; border: 1.5px solid #bae6fd;
  border-radius: 8px; padding: 3px 10px;
  font-size: 14px; font-weight: 600; color: #0c4a6e;
  white-space: nowrap;
}
body.dark .chunk { background: #0f2d45; border-color: #0ea5e9; color: #7dd3fc; }
.chunk-div {
  font-size: 16px; font-weight: 800;
  color: #f59e0b; padding: 0 2px; line-height: 1;
}
.chunk-tip {
  margin-top: 9px; font-size: 11.5px;
  color: #0369a1; font-weight: 500;
}
body.dark .chunk-tip { color: #38bdf8; }
.chunk-btn { border-color: #7dd3fc !important; }
.chunk-btn:hover, .chunk-btn.open {
  background: #f0f9ff !important; color: #0369a1 !important;
  border-color: #0ea5e9 !important;
}
body.dark .chunk-btn:hover, body.dark .chunk-btn.open {
  background: #0c1e2e !important; color: #38bdf8 !important;
}

/* ── MEMO CARD ────────────────────────────── */
.mcard {
  background: var(--white);
  border: 1px solid var(--border);
  border-left: 4px solid var(--p600);
  border-radius: var(--r);
  box-shadow: var(--sh); padding: 18px 20px; margin-bottom: 28px;
}
.mcard-ttl {
  font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 800; color: var(--p700);
  letter-spacing: .6px; text-transform: uppercase; margin-bottom: 14px;
  display: flex; align-items: center; gap: 7px;
}
.mpt { display: flex; gap: 11px; margin-bottom: 10px; font-size: 13.5px; line-height: 1.65; }
.mnum {
  min-width: 24px; height: 24px; border-radius: 50%;
  background: var(--p100); color: var(--p700);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 800; flex-shrink: 0; margin-top: 2px;
}


/* voice selector bar */
.voice-bar {
  background: var(--p50); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
  display: flex; gap: 8px; align-items: center;
  flex-wrap: wrap; margin-bottom: 12px;
}
.voice-sel-group { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 180px; }
.voice-lbl {
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 700; color: var(--p700);
  white-space: nowrap;
}
.voice-sel {
  flex: 1; background: var(--white); border: 1px solid var(--border2);
  border-radius: 8px; padding: 5px 8px;
  font-size: 12px; color: var(--ink); font-family: inherit;
  cursor: pointer; transition: border-color .2s;
}
.voice-sel:focus { outline: none; border-color: var(--p500); }

/* global download bar */
.global-dl-bar {
  background: var(--p50); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; gap: 10px; flex-wrap: wrap;
}
.global-dl-txt { font-size: 12px; color: var(--ink3); font-weight: 500; }
.global-dl-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 700; padding: 8px 20px;
  border-radius: 20px; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--p600), var(--p800));
  color: #fff; transition: all .2s; white-space: nowrap;
  box-shadow: 0 2px 10px rgba(124,58,237,.3);
}
.global-dl-btn:hover { opacity: .88; }
.global-dl-btn:disabled { opacity: .5; cursor: not-allowed; }

/* footer */
.foot {
  text-align: center; font-size: 12px; color: var(--ink3);
  padding: 12px; border-top: 1px solid var(--border);
  background: var(--white); font-weight: 500;
}

/* ── DARK THEME ───────────────────────────────── */
body.dark {
  --bg:     #100d1f;
  --white:  #181428;
  --ink:    #ede9fe;
  --ink2:   #c4bbec;
  --ink3:   #7b72a8;
  --border: #2e2650;
  --border2:#3d3368;
  --p50:    #1e1738;
  --p100:   #2d2252;

  --green-l: #0a2e22;
  --amber-l: #2a1f04;
  --red-l:   #2a0a0a;

  --sh:  0 1px 12px rgba(0,0,0,.4);
  --sh2: 0 4px 24px rgba(0,0,0,.5);

  background: #100d1f !important;
  color: #ede9fe !important;
}
body.dark .hdr {
  background: #130f24;
  box-shadow: 0 2px 16px rgba(0,0,0,.5);
}
body.dark .global-dl-bar { background: #1e1738; }
body.dark .foot          { background: #130f24; }
body.dark .key-bar       { background: #1e1738; }
body.dark .voice-bar     { background: #1e1738; }
body.dark .spk { filter: brightness(.85); }
body.dark .key-bar input { background: #1e1738; }
body.dark .voice-sel     { background: #1e1738; }
body.dark .ko-txt        { color: #a78bfa; }
body.dark .nex           { color: var(--ink3); }
body.dark .nex-ko        { color: #c084fc; }
body.dark .tag-grammar   { background: #1e3055; color: #93c5fd; }
body.dark .tag-vocab     { background: #0d2e1f; color: #6ee7b7; }
body.dark .tag-phrase    { background: #2d1e04; color: #fcd34d; }
body.dark .tag-idiom     { background: #2d1e4a; color: #c4b5fd; }
body.dark .mnum          { background: #2a1f04; }
body.dark .lt:hover      { color: var(--p400); }
body.dark .xbtn:hover,
body.dark .xbtn.open     { background: #2d2252; color: var(--p400); border-color: var(--p500); }
body.dark .abtn:hover    { background: #2d2252; color: var(--p400); border-color: var(--p500); }
body.dark .icon-btn:hover { background: #2d2252; color: var(--p400); }

/* dark toggle button */
.theme-btn {
  background: none; border: 1.5px solid var(--border2);
  border-radius: 20px; padding: 4px 12px;
  font-size: 13px; cursor: pointer; transition: all .2s;
  color: var(--ink3); font-family: 'Outfit', sans-serif;
  font-weight: 600; line-height: 1;
}
.theme-btn:hover { border-color: var(--p500); color: var(--p600); }

</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">

    <div class="hdr-top">
      <div class="logo">
        <div class="logo-icon">📖</div>
        <div class="logo-text">
          Daily English
          <span>Script & Practice</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="date-pill" id="dateBadge"></div>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
      </div>
    </div>

    <div class="key-bar">
      <label>🔊 ElevenLabs Key</label>
      <input type="password" id="elKey" placeholder="없으면 브라우저 TTS · 다운로드 불가" />
      <button class="kbtn p" onclick="saveElKey()">저장</button>
      <button class="kbtn g" onclick="clearElKey()">초기화</button>
    </div>

    <div class="voice-bar" id="voiceBar" style="display:none">
      <div class="voice-sel-group">
        <span class="voice-lbl">🎙 A 목소리</span>
        <select id="selA" class="voice-sel" onchange="saveVoice()">
          <option value="">불러오는 중…</option>
        </select>
      </div>
      <div class="voice-sel-group">
        <span class="voice-lbl">🎙 B 목소리</span>
        <select id="selB" class="voice-sel" onchange="saveVoice()">
          <option value="">불러오는 중…</option>
        </select>
      </div>
      <button class="kbtn g" onclick="previewVoice(true)" title="A 목소리 미리듣기">▶ A</button>
      <button class="kbtn g" onclick="previewVoice(false)" title="B 목소리 미리듣기">▶ B</button>
    </div>

    <div class="tabs">
      <div class="tab active" data-t="0" onclick="switchTab(0)">💬 Daily Chat</div>
      <div class="tab"        data-t="1" onclick="switchTab(1)">💼 Business</div>
      <div class="tab"        data-t="2" onclick="switchTab(2)">🎯 Interview</div>
      <div class="tab"        data-t="3" onclick="switchTab(3)">👶 Baby Talk</div>
    </div>

  </div>
</div>

<div class="main">
  <div class="global-dl-bar">
    <span class="global-dl-txt">🎵 ElevenLabs 키가 있으면 전체 스크립트 40줄을 MP3 파일 1개로 저장할 수 있어요</span>
    <button class="global-dl-btn" id="globalDlBtn" onclick="downloadAllScripts()">⬇ 전체 스크립트 MP3 다운로드</button>
  </div>
  <div id="panel0" class="panel active"></div>
  <div id="panel1" class="panel"></div>
  <div id="panel2" class="panel"></div>
  <div id="panel3" class="panel"></div>
</div>

<div class="foot">▶ 개별 재생 &nbsp;·&nbsp; 📝 암기모드 &nbsp;·&nbsp; ⬇ 전체 스크립트 MP3 다운로드 &nbsp;·&nbsp; ElevenLabs 없으면 브라우저 TTS 자동 사용</div>

<script>
// ═══════════════════════════════════════════════════
// SCRIPT DATA
// ═══════════════════════════════════════════════════
const SCRIPTS = [

// ─────────── 0 · Daily Chat ───────────────────────
{
  title:"Weekend Plans & Favorite Spots", icon:"☀️",
  speakers:["Jake","Mia"],
  lines:[
    { speaker:"Jake", text:"Hey, what are you up to this weekend? Got anything fun planned?",
      chunks:["Hey,", "what are you up to", "this weekend?", "Got anything fun planned?"],
      ko:"야, 이번 주말에 뭐 해? 재미있는 계획 있어?",
      notes:[
        {tag:"phrase",label:"What are you up to?",explanation:"'뭐 하고 있어?' / '뭐 할 거야?' — 상대방의 계획이나 현재 상황을 묻는 가장 자연스러운 구어체. 'What are you doing?'보다 훨씬 원어민스럽다.",example:"Hey, what are you up to later tonight?",exampleKo:"야, 오늘 저녁에 뭐 해?"},
        {tag:"grammar",label:"Got anything? (= Have you got)",explanation:"구어체에서 'Have you got'의 'Have you'를 생략한 형태. 비격식 대화에서 매우 흔함.",example:"Got any plans for the holidays?",exampleKo:"연휴에 뭔 계획 있어?"},
        {tag:"vocab",label:"fun planned",explanation:"'계획된 재미있는 것' — 'Do you have fun plans?'와 같은 뜻. 'planned'는 형용사처럼 쓰임.",example:"We've got something fun planned for her birthday!",exampleKo:"걔 생일에 재미있는 거 준비해뒀어!"},
        {tag:"idiom",label:"anything fun",explanation:"'재미있는 것' — 'something fun'과 같은 뜻. 'fun'을 명사 앞 형용사로 쓰는 패턴은 구어체에서 매우 자연스럽다.",example:"Is there anything fun happening this weekend?",exampleKo:"이번 주말에 재미있는 거 있어?"},
        {tag:"grammar",label:"this weekend (미래 표현)",explanation:"영어에서 미래 계획을 말할 때 'this weekend'와 현재시제/현재진행형을 함께 쓸 수 있다. 'What are you doing this weekend?'도 미래 의미.",example:"What are you doing this weekend? — I'm visiting my parents.",exampleKo:"이번 주말에 뭐 해? — 부모님 뵈러 가려고."}

    { speaker:"Mia", text:"Not much, honestly. I might just chill at home and catch up on some shows.",

        {tag:"idiom",label:"catch up on",explanation:"'(밀린 것을) 따라잡다' — 못 봤던 드라마, 못 읽은 이메일 등을 한꺼번에 하다. 'catch up on sleep(밀린 잠 자다)'도 자주 쓰임.",example:"I need to catch up on my emails after the vacation.",exampleKo:"휴가 끝나고 밀린 이메일 다 봐야 해."},
        {tag:"vocab",label:"chill (at home)",explanation:"'(집에서) 쉬다, 빈둥거리다' — relax보다 훨씬 캐주얼. 'chill out'이라고도 함.",example:"I just want to chill this weekend — no plans at all.",exampleKo:"이번 주말엔 그냥 쉬고 싶어 — 아무 계획 없이."},
        {tag:"grammar",label:"I might just ~",explanation:"'그냥 ~할 것 같아' — might는 50% 이하 가능성을 나타내는 조동사. 'just'를 더해 별거 아닌 것처럼 가볍게 말하는 뉘앙스.",example:"I might just order pizza and watch Netflix tonight.",exampleKo:"오늘 저녁에 그냥 피자 시켜서 넷플릭스나 볼 것 같아."},

    { speaker:"Jake", text:"Oh nice, same here. But maybe we could grab some coffee on Saturday morning?",

      ko:"오 좋다, 나도 마찬가지야. 근데 토요일 아침에 커피 한 잔 하러 갈 수도 있지 않을까?",
      notes:[
        {tag:"phrase",label:"Same here",explanation:"'나도 마찬가지야' — 상대방의 말에 동의하거나 같은 상황임을 나타내는 구어체. 'Me too'보다 더 자연스럽다.",example:"— I'm exhausted. — Same here, it's been a crazy week.",exampleKo:"— 너무 지쳐. — 나도, 정말 정신없는 한 주였어."},
        {tag:"vocab",label:"grab (food/drink)",explanation:"'빠르게 먹다/마시다' — 가볍게 먹으러 가자고 할 때 쓰는 캐주얼 표현. 'grab lunch / grab a bite'도 자주 쓰임.",example:"Wanna grab a beer after work?",exampleKo:"퇴근하고 맥주 한 잔 할래?"},
        {tag:"grammar",label:"maybe we could ~",explanation:"'~하면 어떨까?' — could를 써서 가볍게 제안하는 표현. 'Let's'보다 부드럽고 상대 의사를 배려하는 뉘앙스.",example:"Maybe we could check out that new restaurant on Friday?",exampleKo:"금요일에 그 새로 생긴 식당 가볼까?"},
        {tag:"phrase",label:"Oh nice",explanation:"'오, 좋다' — 상대방의 말에 긍정적으로 반응하는 짧은 감탄사. 'That's great!' / 'Cool!'과 비슷한 뉘앙스.",example:"— I'm free this weekend. — Oh nice, same here!",exampleKo:"— 이번 주말에 시간 돼. — 오 좋다, 나도!"},
        {tag:"grammar",label:"But maybe ~ (전환 표현)",explanation:"'근데 ~' — But으로 화제를 자연스럽게 전환하면서 새로운 제안을 꺼내는 패턴. 구어체에서 매우 흔함.",example:"That sounds fun. But maybe we could invite Sarah too?",exampleKo:"재밌겠다. 근데 Sarah도 같이 부를까?"}
      ]

    { speaker:"Mia", text:"Sure, I'm down! Do you have a spot in mind, or should we just wing it?",
      chunks:["Sure, I'm down!", "Do you have a spot in mind,", "or should we just wing it?"],
      ko:"좋아, 나야 좋지! 생각해 둔 카페 있어, 아니면 그냥 즉흥으로 갈까?",
      notes:[
        {tag:"idiom",label:"I'm down",explanation:"'나 좋아, 나 할게' — 제안에 동의할 때 쓰는 미국식 구어체. 'I'm in'과 유사. 영국 영어에서는 'I'm up for it'을 더 많이 씀.",example:"— Wanna try that new ramen place? — Yeah, I'm down!",exampleKo:"— 그 새로 생긴 라멘집 가볼래? — 응, 나 좋아!"},
        {tag:"idiom",label:"wing it",explanation:"'즉흥적으로 하다, 계획 없이 하다' — 미리 준비 없이 그냥 해보는 것. 연극에서 무대 날개(wing)에서 대사를 보며 연기하던 것에서 유래.",example:"I didn't prepare for the presentation — I just winged it.",exampleKo:"발표 준비 못 했어 — 그냥 즉흥으로 했어."},
        {tag:"phrase",label:"have a spot in mind",explanation:"'생각해 둔 장소가 있다' — 'have ~ in mind'는 '~를 마음속으로 생각해두다'의 뜻. 장소, 선물, 계획 등에 두루 쓰임.",example:"Do you have a restaurant in mind, or should I pick one?",exampleKo:"생각해 둔 식당 있어, 아니면 내가 골라볼까?"},
        {tag:"phrase",label:"Sure!",explanation:"'물론이죠, 좋아요' — 'Yes'보다 더 가볍고 열정적인 동의. 'Of course'보다 캐주얼.",example:"— Can you help me with this? — Sure, no problem!",exampleKo:"— 이거 도와줄 수 있어? — 물론이지, 문제없어!"},
        {tag:"grammar",label:"should we ~ ? (제안 의문문)",explanation:"'우리 ~할까?' — should we를 이용해 공동 결정을 제안하는 표현. 'Do you want to ~?'보다 더 포용적인 뉘앙스.",example:"Should we just take a taxi, or do you want to walk?",exampleKo:"그냥 택시 탈까, 아니면 걸어갈래?"}
      ]

      ko:"홍대에 새로 생긴 카페 생각하고 있었어. 라떼가 엄청 맛있다고 들었거든.",
      notes:[
        {tag:"grammar",label:"I was thinking ~",explanation:"과거진행형으로 제안을 부드럽게 전달. 직접 말하는 것보다 덜 강요하는 뉘앙스. 'I think we should go'보다 훨씬 소프트함.",example:"I was thinking we could try somewhere new tonight.",exampleKo:"오늘 밤에 새로운 데 가볼까 생각하고 있었어."},
        {tag:"phrase",label:"I heard (that) ~",explanation:"'~라고 들었어' — 직접 경험이 아닌 간접 정보를 전달할 때. 소문이나 추천을 공유할 때 자주 쓰임.",example:"I heard that café has a two-hour wait on weekends.",exampleKo:"그 카페는 주말에 두 시간이나 기다린다고 들었어."},
        {tag:"vocab",label:"amazing",explanation:"'엄청난, 놀라운' — 매우 강한 긍정 형용사. 구어체에서 'great', 'awesome', 'incredible'과 함께 자주 쓰임. 남용하면 진부해질 수 있음.",example:"The pasta there is amazing — definitely worth trying.",exampleKo:"거기 파스타 진짜 맛있어 — 꼭 먹어봐야 해."},
        {tag:"phrase",label:"that new place",explanation:"'그 새로 생긴 곳' — 'that'을 써서 두 사람 모두 알 법한 특정 장소를 가리킬 때. 'that + 명사'로 공유된 맥락을 나타냄.",example:"Have you been to that new bar downtown?",exampleKo:"시내에 새로 생긴 그 바 가봤어?"},
        {tag:"grammar",label:"on Hongdae (장소 전치사 on)",explanation:"거리나 특정 구역 이름 앞에 'on'을 쓰는 경우. 'in Hongdae(홍대 안에)'와 미묘하게 다름. 주소나 거리명에는 on을 씀.",example:"There's a great café on Itaewon-ro.",exampleKo:"이태원로에 괜찮은 카페 있어."}
      ]
    },

        {tag:"phrase",label:"Sounds good to me",explanation:"'나는 좋아' — 상대방의 제안에 동의하는 자연스러운 표현. 'That works for me'와 유사. 'Sounds great/perfect'도 같은 뉘앙스.",example:"— Let's meet at 10. — Sounds good to me!",exampleKo:"— 10시에 만나자. — 나는 좋아!"},
        {tag:"grammar",label:"What time were you thinking?",explanation:"과거진행형으로 상대에게 의견을 물을 때. '몇 시 생각해?'보다 부드럽고 배려하는 뉘앙스. 상대방의 아이디어를 존중하는 표현.",example:"What place were you thinking of going to?",exampleKo:"어디 갈 생각이었어?"},
        {tag:"vocab",label:"Ooh!",explanation:"'오!' — 기쁨이나 관심을 나타내는 감탄사. 'Oh'보다 더 들떠 있고 긍정적인 뉘앙스. 주로 여성 화자가 많이 쓰지만 성별 구분 없이 사용됨.",example:"Ooh, that sounds fun! Count me in.",exampleKo:"오, 재밌겠다! 나도 낄게."},
        {tag:"phrase",label:"What time ~?",explanation:"'몇 시에?' — 시간을 물을 때 가장 기본적인 표현. 'At what time'보다 훨씬 자연스러운 구어체.",example:"What time does the movie start?",exampleKo:"영화 몇 시에 시작해?"},
        {tag:"grammar",label:"were you thinking (간접적 질문)",explanation:"직접 'What time do you want?'보다 'were you thinking'이 훨씬 부드럽고 덜 직접적. 상대 의견을 배려하는 영어 화법의 특징.",example:"Were you thinking of inviting anyone else?",exampleKo:"다른 사람도 부를 생각이었어?"}
      ]

    { speaker:"Jake", text:"Maybe around 10? It shouldn't be too crowded that early.",

        {tag:"phrase",label:"that early",explanation:"'그렇게 일찍' — 'that'을 부사로 써서 정도를 표현하는 구어체. 'so early'보다 더 자연스러운 표현.",example:"I didn't think it would be that cold in October.",exampleKo:"10월에 그렇게 추울 줄 몰랐어."},
        {tag:"vocab",label:"crowded",explanation:"'붐비는, 복잡한' — 사람이 많아서 꽉 찬 상태. 'packed'는 더 강한 표현 ('완전 꽉 찬').",example:"The subway is always crowded during rush hour.",exampleKo:"지하철은 러시아워에 항상 붐벼."},

        {tag:"phrase",label:"works for me",explanation:"'나한테 좋아 / 가능해' — 시간이나 계획이 자신에게 맞다고 말할 때. 'That's fine with me'와 유사.",example:"Friday afternoon works for me. Does it work for you?",exampleKo:"금요일 오후 나는 돼. 너는 어때?"},

      ]

        {tag:"vocab",label:"regular spot",explanation:"'단골 장소' — 자주 가는 곳. 'our go-to place'와 같은 뜻. 'regular'는 '단골의, 자주 가는'의 의미.",example:"This coffee shop has become our regular spot after work.",exampleKo:"이 카페가 우리 퇴근 후 단골 카페가 됐어."},
        {tag:"grammar",label:"if ~ (조건절) + will (결과절)",explanation:"'만약 ~하면 ~할 것이다' — 1종 조건문(현실 가능성 있는 조건). If + 현재, will + 동사원형.",example:"If the food is good, we'll definitely come back.",exampleKo:"음식이 맛있으면 꼭 다시 오자."},

        {tag:"phrase",label:"Good morning, baby!",explanation:"'좋은 아침이야, 아가!' — 아기에게 하루를 시작할 때 쓰는 가장 기본적인 인사. 매일 반복하면 아기가 패턴을 인식하게 됨.",example:"Good morning, sunshine! Time to wake up!",exampleKo:"좋은 아침이야, 햇살아! 일어날 시간이야!"},
        {tag:"phrase",label:"Did you sleep well?",explanation:"'잘 잤어?' — 아기 수면 후 자연스럽게 건네는 표현. 단어와 억양 패턴을 반복해서 들려주는 것이 언어 발달에 중요.",example:"Did you sleep well, little one? You look so refreshed!",exampleKo:"잘 잤어, 꼬마야? 생기가 넘치는데!"},
        {tag:"vocab",label:"Mommy / Daddy",explanation:"'엄마 / 아빠' — 영어권에서 아기와 대화할 때 쓰는 호칭. 격식체는 'Mom/Dad'지만 아기한테는 'Mommy/Daddy'가 자연스러움.",example:"Mommy's right here! Don't worry.",exampleKo:"엄마 여기 있어! 걱정 마."},
        {tag:"phrase",label:"missed you so much",explanation:"'너무 보고 싶었어' — 감정을 과장해서 표현하는 것이 아기 언어 발달에 도움이 됨. 'so much'로 강도를 높임.",example:"We missed you so much while you were sleeping!",exampleKo:"자는 동안 너무 보고 싶었어!"},
        {tag:"grammar",label:"Baby talk 억양 (Motherese)",explanation:"아기에게 말할 때 높고 느린 억양(Motherese/Child-directed speech)을 쓰는 것이 과학적으로 언어 발달에 효과적임. 과장된 표현과 반복이 핵심.",example:"You're SO cute! Yes, you are! You are SO cute!",exampleKo:"너 정말 너무 귀여워! 맞아, 그렇지! 너 정말 너무 귀엽다고!"}
      ]
    },
    { speaker:"Yooan", text:"(babbling) Aaah~ goo goo~ aabaa~",
      chunks:["(babbling)", "Aaah~", "goo goo~", "aabaa~"],
      ko:"(옹알이) 아아~ 구구~ 아바바~",
      notes:[
        {tag:"vocab",label:"Babbling (옹알이)",explanation:"생후 6~9개월부터 시작되는 음절 반복 옹알이. 'ba-ba', 'da-da', 'ma-ma' 같은 소리가 나오는 시기. 유안이(2025년 6월생)는 지금 딱 이 단계!",example:"Ba-ba-ba! Da-da! Ma-ma-ma!",exampleKo:"바바바! 다다! 마마마!"},
        {tag:"phrase",label:"반응해주기 — Oh really?",explanation:"아기 옹알이에 대화하듯 반응해주는 것이 언어 발달에 매우 중요. 'Oh really?', 'Is that so?', 'Tell me more!'로 대화를 이어가자.",example:"Oh really? Tell me more! I'm listening!",exampleKo:"오 그래? 더 말해봐! 듣고 있어!"},
        {tag:"phrase",label:"What are you saying?",explanation:"'뭐라고 하는 거야?' — 아기의 발성에 반응하며 대화처럼 이어가는 표현. 아기는 반응이 올 때 더 적극적으로 발성함.",example:"What are you saying, Yooan? Are you talking to me?",exampleKo:"유안아, 뭐라고 하는 거야? 나한테 말하는 거야?"},
        {tag:"vocab",label:"Goo goo ga ga",explanation:"'구구 가가' — 영어권에서 아기 옹알이를 표현하는 대표적인 의성어. 아기 소리를 따라 해주면 상호작용에 좋음.",example:"Goo goo ga ga! Are you trying to talk?",exampleKo:"구구 가가! 말하려고 하는 거야?"},
        {tag:"phrase",label:"You're so clever!",explanation:"'정말 똑똑하다!' — 아기의 발성이나 행동에 긍정적으로 반응하는 표현. 칭찬과 격려가 언어 발달을 촉진함.",example:"You made a new sound! You're so clever!",exampleKo:"새로운 소리를 냈네! 정말 똑똑하다!"}
      ]
    },
    { speaker:"Parent", text:"Look at this! It's a ball! Can you say 'ball'? Ball! Red ball!",
      chunks:["Look at this!", "It's a ball!", "Can you say 'ball'?", "Ball!", "Red ball!"],
      ko:"이것 봐! 공이야! '공' 할 수 있어? 공! 빨간 공!",
      notes:[
        {tag:"phrase",label:"Look at this!",explanation:"'이것 봐!' — 아기의 주의를 끌어 특정 물체에 집중시키는 표현. 시선을 유도할 때 손가락으로 가리키며 함께 사용.",example:"Look at this! It's a puppy! Puppy!",exampleKo:"이것 봐! 강아지야! 강아지!"},
        {tag:"grammar",label:"It's a + 명사 (사물 이름 가르치기)",explanation:"'이건 ~야' — 사물을 가리키며 이름을 알려주는 가장 기본적인 패턴. 반복이 핵심. 하루에 같은 단어를 10번 이상 들려주는 것이 효과적.",example:"It's a cup! Cup! It's a book! Book!",exampleKo:"컵이야! 컵! 책이야! 책!"},
        {tag:"phrase",label:"Can you say '~'?",explanation:"'~라고 할 수 있어?' — 아기에게 단어를 따라 말하도록 유도하는 표현. 아직 말을 못해도 뇌에서 언어 패턴을 학습하는 중.",example:"Can you say 'mama'? Mama! Can you say it?",exampleKo:"'엄마' 할 수 있어? 엄마! 할 수 있어?"},
        {tag:"vocab",label:"색깔 + 명사 함께 사용",explanation:"'빨간 공'처럼 색깔과 명사를 함께 말해주면 두 단어를 동시에 학습할 수 있음. 일상에서 자연스럽게 형용사를 노출시키는 방법.",example:"Blue cup! Yellow banana! Green frog!",exampleKo:"파란 컵! 노란 바나나! 초록 개구리!"},
        {tag:"phrase",label:"That's right! / Good job!",explanation:"'맞아! / 잘했어!' — 아기가 물체를 바라보거나 반응을 보일 때 즉각적으로 칭찬하는 표현. 긍정 강화가 학습을 강화함.",example:"That's right! It's a ball! Good job, Yooan!",exampleKo:"맞아! 공이야! 잘했어, 유안아!"}
      ]
    },
    { speaker:"Yooan", text:"(reaches out and touches the ball) Bah! Bah-bah!",
      chunks:["(reaches out and touches the ball)", "Bah!", "Bah-bah!"],
      ko:"(공에 손을 뻗어 만지며) 바! 바바!",
      notes:[
        {tag:"phrase",label:"You touched it! / You got it!",explanation:"'만졌네! / 잡았어!' — 아기의 행동에 즉각 언어로 반응해주는 것. 행동과 언어를 연결시켜주는 중요한 과정.",example:"You touched it! Good job! You're so strong!",exampleKo:"만졌네! 잘했어! 정말 힘도 세다!"},
        {tag:"phrase",label:"Are you saying 'ball'?",explanation:"'공이라고 하는 거야?' — 아기의 옹알이를 실제 단어와 연결해주는 표현. 'bah'를 'ball'로 해석해주면 아기가 단어와 소리를 연결하는 데 도움.",example:"Bah-bah? Are you saying 'bottle'? Here's your bottle!",exampleKo:"바바? 젖병이라고 하는 거야? 여기 젖병!"},
        {tag:"vocab",label:"서술해주기 (Narration)",explanation:"아기의 행동을 말로 서술해주는 것이 언어 발달의 핵심 기법. '지금 ~하고 있네'처럼 행동과 언어를 계속 연결해줌.",example:"You're reaching for the toy! You're grabbing it! Good!",exampleKo:"장난감에 손 뻗고 있네! 잡고 있어! 잘한다!"},
        {tag:"phrase",label:"Oh, you like that!",explanation:"'오, 그거 좋아하는구나!' — 아기의 반응이나 선호를 언어로 표현해주는 것. 감정과 언어를 연결하는 중요한 표현.",example:"Oh, you like that rattle! It makes a sound!",exampleKo:"오, 그 딸랑이 좋아하는구나! 소리가 나네!"},
        {tag:"phrase",label:"More? Do you want more?",explanation:"'더? 더 원해?' — 아기의 욕구를 언어로 표현해주는 핵심 표현. 반복 학습에 좋고, 나중에 아기가 'more'를 먼저 말하게 되는 첫 단어 중 하나.",example:"More? Do you want more milk? More!",exampleKo:"더? 우유 더 원해? 더!"}
      ]
    },
    { speaker:"Parent", text:"Let's change your diaper! Clean and fresh — all done! You smell so good now!",
      chunks:["Let's change your diaper!", "Clean and fresh —", "all done!", "You smell so good now!"],
      ko:"기저귀 갈자! 깨끗하고 상쾌해 — 다 됐어! 이제 냄새도 좋아!",
      notes:[
        {tag:"phrase",label:"Let's + 동사원형 (함께 하자)",explanation:"'~하자' — 아기와 함께 하는 행동을 안내할 때 쓰는 표현. 일상 루틴을 영어로 반복하면 자연스럽게 언어가 습득됨.",example:"Let's take a bath! Let's eat! Let's go outside!",exampleKo:"목욕하자! 밥 먹자! 밖에 나가자!"},
        {tag:"vocab",label:"diaper / nappy",explanation:"'기저귀' — 미국식은 'diaper', 영국식은 'nappy'. 'change your diaper'는 '기저귀를 갈다'.",example:"Time to change your diaper! Let's get a clean one.",exampleKo:"기저귀 갈 시간이야! 새 걸로 갈자."},
        {tag:"phrase",label:"All done!",explanation:"'다 됐어!' — 어떤 행동이 끝났을 때 쓰는 표현. 아기 수유, 목욕, 기저귀 교체 후 자주 사용. 나중에 아기가 먼저 'all done!'을 말하는 경우가 많음.",example:"All done eating! All done with bath time!",exampleKo:"다 먹었어! 목욕 다 했어!"},
        {tag:"phrase",label:"Clean and fresh!",explanation:"'깨끗하고 상쾌해!' — 기저귀 교체나 목욕 후 아기 상태를 묘사하는 표현. 형용사를 반복해서 들려주는 것이 어휘 발달에 효과적.",example:"You're so clean and fresh now! Doesn't that feel better?",exampleKo:"이제 깨끗하고 상쾌하지! 더 좋지?"},
        {tag:"phrase",label:"You smell so good!",explanation:"'냄새가 좋아!' — 로션이나 목욕 후 아기에게 자주 쓰는 감각 표현. 감각(냄새, 촉감, 소리)과 관련된 언어를 풍부하게 들려주는 것이 인지 발달에 도움.",example:"You smell so good after your bath! Like flowers!",exampleKo:"목욕하고 나니까 냄새가 너무 좋아! 꽃 같아!"}
      ]
    },
    { speaker:"Yooan", text:"(kicks legs happily) Ah-gah! Eee! Ah-gah-gah!",
      chunks:["(kicks legs happily)", "Ah-gah!", "Eee!", "Ah-gah-gah!"],
      ko:"(다리를 신나게 차며) 아가! 이! 아가가!",
      notes:[
        {tag:"phrase",label:"You're so happy!",explanation:"'정말 기쁘구나!' — 아기의 긍정적인 감정 표현을 언어로 연결해주는 표현. 감정 어휘를 일찍 노출시키는 것이 중요.",example:"You're so happy today! I can see your smile!",exampleKo:"오늘 정말 기쁘구나! 웃는 거 보여!"},
        {tag:"vocab",label:"감정 단어 가르치기",explanation:"happy, sad, excited, tired 같은 감정 단어를 아기 상태에 맞게 자연스럽게 사용해주면 감정 어휘 발달에 도움. 2세 이후 감정 표현의 기초가 됨.",example:"Are you excited? You look so excited!",exampleKo:"신나는 거야? 정말 신나 보이는데!"},
        {tag:"phrase",label:"Look at those legs go!",explanation:"'저 다리 좀 봐!' — 아기의 행동을 즐겁게 묘사하는 표현. 신체 부위(legs, arms, hands, feet)를 자연스럽게 노출할 수 있음.",example:"Look at those arms go! You're so strong!",exampleKo:"저 팔 좀 봐! 정말 힘이 세네!"},
        {tag:"phrase",label:"You're excited, aren't you?",explanation:"'신나는 거지, 그렇지?' — 부가의문문으로 아기에게 확인하듯 묻는 표현. 아기가 대화의 패턴을 인식하는 데 도움.",example:"You like this song, don't you? You're dancing!",exampleKo:"이 노래 좋지, 그렇지? 춤추고 있잖아!"},
        {tag:"vocab",label:"신체 부위 — legs / arms / feet",explanation:"'다리 / 팔 / 발' — 기저귀 교체, 목욕, 옷 갈아입힐 때 자연스럽게 신체 부위를 가르칠 수 있는 최적의 타이밍.",example:"Here are your legs! One leg, two legs!",exampleKo:"다리가 여기 있네! 다리 하나, 다리 둘!"}
      ]
    },
    { speaker:"Parent", text:"Are you hungry? Let's eat! Open wide — here comes the airplane! Yummy!",
      chunks:["Are you hungry?", "Let's eat!", "Open wide —", "here comes the airplane!", "Yummy!"],
      ko:"배고파? 밥 먹자! 입 크게 벌려 — 비행기 온다! 맛있다!",
      notes:[
        {tag:"phrase",label:"Are you hungry?",explanation:"'배고파?' — 아기의 신호를 언어로 확인하는 표현. 배고픔, 피곤함, 불편함 등 욕구를 언어와 연결시켜주는 것이 중요.",example:"Are you hungry? Is your tummy rumbling?",exampleKo:"배고파? 배에서 소리 나?"},
        {tag:"phrase",label:"Open wide!",explanation:"'입 크게 벌려!' — 수유나 이유식 먹일 때 가장 많이 쓰는 표현. 동작과 말을 반복하면 아기가 패턴을 빠르게 인식함.",example:"Open wide! Here comes the spoon!",exampleKo:"입 크게 벌려! 숟가락 온다!"},
        {tag:"phrase",label:"Here comes the airplane!",explanation:"'비행기 온다!' — 세계 공통 이유식 먹이기 트릭. 영어권에서도 'airplane' 또는 'choo-choo train'을 자주 사용.",example:"Here comes the airplane — zoom! Open your mouth!",exampleKo:"비행기 온다 — 슈웅! 입 벌려!"},
        {tag:"vocab",label:"Yummy! / Delicious!",explanation:"'맛있다!' — 음식 맛을 표현하는 기본 어휘. 'Yummy'는 아기/어린이용 표현, 'delicious'는 더 격식체. 식사 시간마다 반복.",example:"Yummy! Is it good? Do you like it?",exampleKo:"맛있다! 맛있어? 좋아해?"},
        {tag:"phrase",label:"Good job eating!",explanation:"'밥 잘 먹었어!' — 식사를 마친 후 칭찬하는 표현. 긍정 강화로 식사 시간을 즐거운 경험으로 만들어줌.",example:"Good job eating all of it! You're such a good eater!",exampleKo:"다 먹었네! 정말 잘 먹는구나!"}
      ]
    },
    { speaker:"Yooan", text:"(opens mouth wide, then makes a face) Mmm~ Bah! Pthhh~",
      chunks:["(opens mouth wide, then makes a face)", "Mmm~", "Bah!", "Pthhh~"],
      ko:"(입을 크게 벌렸다가 표정을 지으며) 음~ 바! 프쓰~",
      notes:[
        {tag:"phrase",label:"Do you like it? / Don't you like it?",explanation:"'좋아? / 싫어?' — 아기의 표정 반응을 보고 선호를 물어보는 표현. 긍정/부정 언어 패턴을 자연스럽게 노출.",example:"Do you like the carrots? It looks like you don't!",exampleKo:"당근 좋아? 별로인 것 같은데!"},
        {tag:"phrase",label:"It's okay! Try again!",explanation:"'괜찮아! 다시 해봐!' — 아기가 싫어하는 음식을 먹을 때 격려하는 표현. 긍정적인 어조로 반복이 중요.",example:"It's okay! Try it one more time. You might like it!",exampleKo:"괜찮아! 한 번만 더 먹어봐. 좋아할 수도 있어!"},
        {tag:"phrase",label:"Making a funny face!",explanation:"'웃긴 표정 짓고 있네!' — 아기의 표정을 언어로 묘사하는 표현. 표정과 감정 어휘를 연결하는 중요한 상호작용.",example:"You're making a funny face! Is it sour?",exampleKo:"웃긴 표정 짓고 있네! 셔?"},
        {tag:"vocab",label:"맛 표현 — sweet, sour, bitter",explanation:"'달다, 시다, 쓰다' — 이유식 시작 시기에 맛 어휘를 자연스럽게 노출할 수 있는 좋은 기회.",example:"Is it sweet? Or is it sour? It's yummy!",exampleKo:"달아? 아니면 셔? 맛있는데!"},
        {tag:"phrase",label:"You're so expressive!",explanation:"'표정이 정말 풍부하구나!' — 아기의 풍부한 표정에 반응하는 표현. 아기의 의사소통 능력을 언어로 긍정적으로 강화.",example:"You're so expressive! I can always tell how you feel!",exampleKo:"표정이 정말 풍부하구나! 항상 기분이 보여!"}
      ]
    },
    { speaker:"Parent", text:"It's bath time! In you go! Splash splash! Water is warm — does that feel nice?",
      chunks:["It's bath time!", "In you go!", "Splash splash!", "Water is warm —", "does that feel nice?"],
      ko:"목욕 시간이야! 들어가자! 첨벙첨벙! 물이 따뜻해 — 기분 좋지?",
      notes:[
        {tag:"phrase",label:"It's + 시간 + time!",explanation:"'~ 시간이야!' — 일상 루틴을 영어로 알려주는 표현. 'bath time, nap time, play time, meal time'을 매일 반복하면 효과적.",example:"It's nap time! It's play time! It's bed time!",exampleKo:"낮잠 시간이야! 놀이 시간이야! 잘 시간이야!"},

async function fetchTTSBlob(text, isA) {
  if (!elKey) return null;
  const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${isA ? VOICES.A : VOICES.B}`, {
    method: 'POST',
    headers: { 'xi-api-key': elKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, model_id:'eleven_flash_v2_5', voice_settings:{ stability:.5, similarity_boost:.75 } })
  });
  if (!res.ok) throw new Error(`ElevenLabs ${res.status}`);
  return await res.blob();
}

// ─── Play single ──────────────────────────────────
async function playTTS(btn, text, isA) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (playingBtn && playingBtn !== btn) playingBtn.classList.remove('pl');
  if (playingBtn === btn) { btn.classList.remove('pl'); playingBtn=null; speechSynthesis.cancel(); return; }
  btn.classList.add('pl'); playingBtn = btn;

  if (!elKey) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=.87; u.pitch=isA?1.05:.9;
    u.onend=()=>{ btn.classList.remove('pl'); if(playingBtn===btn) playingBtn=null; };
    speechSynthesis.speak(u); return;
  }
  try {
    const blob  = await fetchTTSBlob(text, isA);
    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url); currentAudio=audio; audio.play();
    audio.onended=()=>{ btn.classList.remove('pl'); if(playingBtn===btn) playingBtn=null; URL.revokeObjectURL(url); currentAudio=null; };
  } catch {
    btn.classList.remove('pl'); playingBtn=null;
    const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=.87; speechSynthesis.speak(u);
  }
}

// ─── Download single ──────────────────────────────
async function downloadTTS(btn, text, isA, filename) {
  if (!elKey) { alert('⚠️ ElevenLabs 키를 먼저 입력·저장해주세요.\n(브라우저 TTS는 파일 저장 불가)'); return; }
  btn.classList.add('loading'); btn.textContent='⏳';
  try {
    const blob = await fetchTTSBlob(text, isA);
    triggerDownload(blob, `${filename}.mp3`);
    btn.classList.remove('loading'); btn.classList.add('done'); btn.textContent='✔';
    setTimeout(()=>{ btn.classList.remove('done'); btn.textContent='⬇'; }, 2500);
  } catch(e) {
    btn.classList.remove('loading'); btn.textContent='⬇';
    alert('다운로드 실패: ' + e.message);
  }
}

// ─── Download ALL sections → single MP3 ───────────
async function downloadAllScripts() {
  if (!elKey) { alert('⚠️ ElevenLabs 키를 먼저 입력·저장해주세요.'); return; }
  const btn   = document.getElementById('globalDlBtn');
  const grand = SCRIPTS.reduce((a, s) => a + s.lines.length, 0);
  btn.disabled = true;

  const buffers = [];
  let success   = 0;

  for (let idx = 0; idx < SCRIPTS.length; idx++) {
    const script = SCRIPTS[idx];
    for (let i = 0; i < script.lines.length; i++) {
      btn.textContent = `⏳ ${success + 1} / ${grand} 생성 중…`;
      try {
        const blob = await fetchTTSBlob(script.lines[i].text, i % 2 === 0);
        const buf  = await blob.arrayBuffer();
        buffers.push(buf);
        success++;
      } catch (e) {
        console.error(`[${SECTION_NAMES[idx]}] line ${i+1}:`, e);
      }
      await new Promise(r => setTimeout(r, 180));
    }
  }

  if (buffers.length === 0) {
    btn.disabled = false;
    btn.textContent = '⬇ 전체 스크립트 MP3 다운로드';
    alert('파일 생성에 실패했습니다. API 키를 확인해주세요.');
    return;
  }

  // 모든 MP3 ArrayBuffer를 하나로 이어붙이기
  btn.textContent = '🔗 파일 합치는 중…';
  const totalBytes = buffers.reduce((a, b) => a + b.byteLength, 0);
  const merged     = new Uint8Array(totalBytes);
  let   offset     = 0;
  for (const buf of buffers) {
    merged.set(new Uint8Array(buf), offset);
    offset += buf.byteLength;
  }

  const mp3Blob = new Blob([merged], { type: 'audio/mpeg' });
  const d       = new Date();
  const date    = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  triggerDownload(mp3Blob, `daily-english_${date}.mp3`);

  btn.disabled = false;
  btn.textContent = `✔ ${success}줄 합치기 완료`;
  setTimeout(() => { btn.textContent = '⬇ 전체 스크립트 MP3 다운로드'; }, 3500);
}

function triggerDownload(blob, filename) {
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

// ─── Play all ─────────────────────────────────────
const delay = ms => new Promise(r=>setTimeout(r,ms));

async function playAll(idx) {
  const script = SCRIPTS[idx];
  const btn    = document.getElementById(`palBtn${idx}`);
  if (playAllState && playAllState.idx===idx) {
    playAllState.stop=true; playAllState=null;
    if(currentAudio){currentAudio.pause();currentAudio=null;}
    speechSynthesis.cancel();
    btn.classList.remove('pal-on'); btn.textContent='▶ 전체재생'; return;
  }
  if (playAllState) playAllState.stop=true;
  btn.classList.add('pal-on'); btn.textContent='⏹ 중지';
  const state={idx,stop:false}; playAllState=state;

  for (let i=0; i<script.lines.length; i++) {
    if(state.stop) break;
    await playLineAsync(script.lines[i].text, i%2===0);
    if(!state.stop) await delay(450);
  }
  if(!state.stop){ btn.classList.remove('pal-on'); btn.textContent='▶ 전체재생'; playAllState=null; }
}

function playLineAsync(text, isA) {
  return new Promise(async res => {
    if (!elKey) {
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=.87; u.pitch=isA?1.05:.9;
      u.onend=res; speechSynthesis.speak(u); return;
    }
    try {
      const blob=await fetchTTSBlob(text,isA);
      const url=URL.createObjectURL(blob);
      const audio=new Audio(url); currentAudio=audio; audio.play();
      audio.onended=()=>{ URL.revokeObjectURL(url); currentAudio=null; res(); };
    } catch { res(); }
  });
}

// ─── Dark / Light Theme ───────────────────────────
function toggleTheme() {
  const dark = document.body.classList.toggle('dark');
  document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}
</script>
